services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: verkiezingen-web
    restart: unless-stopped
    networks:
      - appnet

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: verkiezingen-cloudflared
    restart: unless-stopped
    command: tunnel run --token ${CF_TUNNEL_TOKEN}
    environment:
      - CF_TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
